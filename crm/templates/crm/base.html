<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f12;
            --surface: #141720;
            --surface2: #1c2030;
            --border: #252a3a;
            --accent: #4f6ef7;
            --accent2: #7c3aed;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --text: #e8eaf0;
            --muted: #6b7280;
            --mono: 'DM Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
        }

        .sidebar-logo {
            padding: 28px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo span {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-logo small {
            display: block;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
            -webkit-text-fill-color: var(--muted);
        }

        .sidebar nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--muted);
            padding: 12px 12px 6px;
            text-transform: uppercase;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .nav-link:hover { background: var(--surface2); color: var(--text); }
        .nav-link.active { background: rgba(79,110,247,0.15); color: var(--accent); }

        .nav-icon { font-size: 16px; width: 20px; text-align: center; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
        }

        /* ── Main ── */
        .main {
            margin-left: 220px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .page-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .topbar-actions { display: flex; gap: 10px; align-items: center; }

        .content { padding: 32px; flex: 1; }

        /* ── Components ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
            font-family: var(--mono);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: #3b55e0; }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
        }

        .badge-new       { background: rgba(79,110,247,0.15); color: #7b9cf7; }
        .badge-contacted { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .badge-qualified { background: rgba(124,58,237,0.15); color: #a78bfa; }
        .badge-converted { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge-lost      { background: rgba(239,68,68,0.15);  color: var(--red); }
        .badge-default   { background: var(--surface2); color: var(--muted); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 10px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }

        /* Grid */
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        /* Stat card */
        .stat { }
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }
        .stat-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
        }
        .stat-accent { color: var(--accent); }
        .stat-green  { color: var(--green); }
        .stat-yellow { color: var(--yellow); }
        .stat-red    { color: var(--red); }

        /* Form elements */
        input, select, textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 14px;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
        }
        label {
            display: block;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .form-group { margin-bottom: 16px; }

        /* Alert */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
        .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--red); }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-text { font-size: 14px; }

        /* Tag pill */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin: 2px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Utility */
        .text-muted { color: var(--muted); }
        .text-mono  { font-family: var(--mono); }
        .text-sm    { font-size: 13px; }
        .mt-4       { margin-top: 16px; }
        .mt-6       { margin-top: 24px; }
        .mb-4       { margin-bottom: 16px; }
        .flex       { display: flex; }
        .items-center { align-items: center; }
        .gap-2      { gap: 8px; }
        .gap-3      { gap: 12px; }
        .justify-between { justify-content: space-between; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <span>NERVE CRM</span>
        <small>sales intelligence</small>
    </div>
    <nav>
        <div class="nav-label">Main</div>
        <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <span class="nav-icon">⬡</span> Dashboard
        </a>
        <a href="{% url 'lead_list' %}" class="nav-link {% if 'lead' in request.resolver_match.url_name %}active{% endif %}">
            <span class="nav-icon">◈</span> Leads
        </a>
        <a href="{% url 'customer_list' %}" class="nav-link {% if 'customer' in request.resolver_match.url_name %}active{% endif %}">
            <span class="nav-icon">◉</span> Customers
        </a>
        <a href="{% url 'pipeline_board' %}" class="nav-link {% if request.resolver_match.url_name == 'pipeline_board' %}active{% endif %}">
            <span class="nav-icon">▦</span> Pipeline
        </a>

        <div class="nav-label" style="margin-top:12px">Reports</div>
        <a href="{% url 'sales_analytics' %}" class="nav-link {% if request.resolver_match.url_name == 'sales_analytics' %}active{% endif %}">
            <span class="nav-icon">◎</span> Analytics
        </a>
    </nav>
    <div class="sidebar-footer">
        {% if user.is_authenticated %}
            ● {{ user.username }}<br>
            <a href="/admin/" style="color:var(--muted);text-decoration:none;">admin panel ↗</a>
        {% endif %}
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div class="page-title">{% block page_title %}{% endblock %}</div>
        <div class="topbar-actions">{% block topbar_actions %}{% endblock %}</div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
